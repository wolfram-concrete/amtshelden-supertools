# Netlify Configuration — Next.js (App Router)
# Das @netlify/plugin-nextjs Plugin wird automatisch erkannt und
# übernimmt SSR/ISR-Routing, Image Optimization und Edge Functions.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Node-Version explizit setzen (Next.js 16 braucht >=18.18)
  NODE_VERSION = "20"
  # Telemetry deaktivieren
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"
